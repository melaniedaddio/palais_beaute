<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable - Le Palais de la Beauté</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fdfbfb;
            color: #8b5a5a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .error-container { max-width: 500px; padding: 40px; }
        h1 { font-size: 72px; margin: 0; color: #e8b4b8; }
        p { font-size: 18px; color: #a67c7c; margin: 20px 0; }
        a {
            display: inline-block;
            padding: 12px 30px;
            background: #c9a86a;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
        }
        a:hover { background: #b89858; }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <p>Cette page n'existe pas ou a été déplacée.</p>
        <a href="/">Retour à l'accueil</a>
    </div>
</body>
</html>
